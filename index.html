    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            height: 100vh;
            margin: 0;
            user-select: none;
            overflow: hidden;
        }

        .left-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
            border-right: 2px solid #334155;
            position: relative;
        }

        .right-panel {
            width: 420px;
            background-color: #1e293b;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .shop-header {
            padding: 1rem;
            text-align: center;
            background-color: #0f172a;
            font-weight: bold;
            font-size: 1.2rem;
            border-bottom: 2px solid #334155;
        }

        .tab-container {
            display: flex;
            background-color: #0f172a;
            border-bottom: 2px solid #334155;
        }

        .tab {
            flex: 1;
            padding: 0.75rem;
            text-align: center;
            cursor: pointer;
            font-weight: bold;
            color: #94a3b8;
            transition: all 0.2s ease-in-out;
        }

        .tab.active {
            color: #38bdf8;
            background-color: #1e293b;
            border-bottom: 2px solid #38bdf8;
        }

        .pane {
            display: none;
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            scroll-behavior: smooth; 
        }

        .pane.active {
            display: block;
        }

        #energy-core {
            width: 180px;
            height: 180px;
            background: radial-gradient(circle, #38bdf8 0%, #3b82f6 50%, #1d4ed8 100%);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 40px #38bdf8, inset 0 0 20px #e0f2fe;
            transition: transform 0.05s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            z-index: 10;
            will-change: transform, box-shadow;
        }

        #energy-core:active {
            transform: scale(0.9);
            box-shadow: 0 0 60px #7dd3fc;
        }

        .score-display {
            font-size: 3rem;
            font-weight: 800;
            color: #bae6fd;
            text-shadow: 0 0 10px rgba(56, 189, 248, 0.5);
            margin-bottom: 0.5rem;
            z-index: 10;
        }

        .stats {
            font-size: 1.2rem;
            color: #94a3b8;
            margin-bottom: 3rem;
            z-index: 10;
        }

        .card {
            background-color: #334155;
            color: #f8fafc;
            border: 2px solid #475569;
            padding: 0.8rem;
            margin-bottom: 0.8rem;
            border-radius: 0.5rem;
            display: flex;
            align-items: center;
            cursor: pointer;
            transition: all 0.1s ease;
            will-change: transform;
        }

        .card:hover:not(.disabled) {
            background-color: #475569;
            border-color: #38bdf8;
            transform: translateX(-2px);
        }

        .card.disabled {
            background-color: #1e293b;
            opacity: 0.4;
            cursor: not-allowed;
            filter: grayscale(100%);
        }

        .card-icon { font-size: 1.8rem; margin-right: 0.75rem; width: 35px; text-align: center; }
        .card-info { flex: 1; text-align: left; }
        .card-name { font-weight: bold; font-size: 1rem; }
        .card-cost { color: #fca5a5; font-weight: bold; font-size: 0.85rem; }
        .card-effect { color: #86efac; font-size: 0.75rem; }
        .card-count { font-size: 1.8rem; color: #38bdf8; opacity: 0.5; font-weight: bold; }

        .particle {
            position: absolute;
            color: #bae6fd;
            font-weight: bold;
            font-size: 1.5rem;
            pointer-events: none;
            animation: floatUp 1s ease-out forwards;
            z-index: 20;
            text-shadow: 0 0 5px #38bdf8;
            will-change: transform, opacity;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-100px) scale(1.5); opacity: 0; }
        }

        /* Standard Troll Panel Layout */
        #dev-panel {
            position: fixed;
            bottom: -300px;
            left: 0;
            width: 100%;
            height: 200px;
            background-color: #020617;
            border-top: 4px solid #ef4444;
            z-index: 100;
            transition: bottom 0.3s ease-in-out;
            padding: 1.5rem;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        #dev-panel.open { bottom: 0; }

        /* SECRET GOD OVERLORD PANEL LAYOUT */
        #god-panel {
            position: fixed;
            bottom: -350px;
            left: 0;
            width: 100%;
            height: 280px; 
            background: linear-gradient(90deg, #1e1b4b 0%, #311042 100%);
            border-top: 4px solid #a855f7;
            z-index: 101;
            transition: bottom 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            padding: 1.5rem;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            box-shadow: 0 -10px 30px rgba(168, 85, 247, 0.3);
        }
        #god-panel.open { bottom: 0; }
        
        .god-header { color: #c084fc; font-weight: 900; font-size: 1.3rem; text-shadow: 0 0 10px #a855f7; display: flex; justify-content: space-between; align-items: center; }
        .dev-header { color: #ef4444; font-weight: bold; font-size: 1.2rem; display: flex; justify-content: space-between; align-items: center; }
        
        .dev-grid, .god-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; }
        
        .cheat-btn { background-color: #991b1b; color: white; border: 1px solid #f87171; padding: 1rem; border-radius: 0.5rem; cursor: pointer; font-weight: bold; }
        .cheat-btn:hover { background-color: #b91c1c; }
        
        .god-btn { background: linear-gradient(135deg, #6b21a8 0%, #4c1d95 100%); color: #f3e8ff; border: 1px solid #c084fc; padding: 1rem; border-radius: 0.5rem; cursor: pointer; font-weight: 900; text-transform: uppercase; letter-spacing: 0.5px; transition: all 0.2s; }
        .god-btn:hover { background: linear-gradient(135deg, #7e22ce 0%, #5b21b6 100%); box-shadow: 0 0 15px #a855f7; transform: scale(1.02); }

        /* Network Data Interceptor UI */
        .network-bar { background: rgba(0, 0, 0, 0.4); padding: 0.5rem 1rem; border-radius: 0.5rem; border: 1px solid #c084fc; display: flex; gap: 1rem; align-items: center; }
        .network-bar label { font-weight: bold; color: #e9d5ff; font-size: 0.9rem; }
        .network-bar select { background: #0f172a; color: #f3e8ff; border: 1px solid #a855f7; padding: 0.4rem; border-radius: 0.25rem; flex: 1; outline: none; }
        .nuke-btn { background: #dc2626; color: white; border: none; padding: 0.4rem 1.2rem; font-weight: bold; border-radius: 0.25rem; cursor: pointer; text-transform: uppercase; font-size: 0.85rem; box-shadow: 0 0 10px rgba(220, 38, 38, 0.4); }
        .nuke-btn:hover { background: #b91c1c; box-shadow: 0 0 15px #ef4444; }

        #save-popup {
            position: fixed;
            top: 20px;
            left: 20px;
            background-color: #059669;
            color: white;
            padding: 0.6rem 1.2rem;
            border-radius: 0.5rem;
            font-weight: bold;
            opacity: 0;
            transition: opacity 0.3s ease-in-out;
            z-index: 200;
        }

        /* --- OFFLINE POPUP STYLES --- */
        #offline-popup {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: #1e293b;
            border: 2px solid #38bdf8;
            color: #f8fafc;
            padding: 2.5rem;
            border-radius: 1rem;
            z-index: 300;
            text-align: center;
            box-shadow: 0 0 50px rgba(56, 189, 248, 0.4), inset 0 0 20px rgba(0, 0, 0, 0.5);
        }

        #offline-popup h2 {
            margin-top: 0;
            color: #bae6fd;
            font-size: 1.8rem;
            text-shadow: 0 0 10px rgba(186, 230, 253, 0.5);
        }

        #offline-popup button {
            margin-top: 1.5rem;
            padding: 0.8rem 1.5rem;
            background: #38bdf8;
            border: none;
            border-radius: 0.5rem;
            color: #0f172a;
            font-weight: 900;
            cursor: pointer;
            font-size: 1.1rem;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        #offline-popup button:hover {
            background: #7dd3fc;
            box-shadow: 0 0 15px #38bdf8;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <div id="save-popup">Cloud Synchronized!</div>

    <div id="offline-popup">
        <h2>System Re-engaged</h2>
        <p style="font-size: 1.2rem; color: #94a3b8;">Your infrastructure kept running while you were offline.</p>
        <p>Total Quantum Energy Generated:<br>
            <strong id="offline-gains" style="font-size: 2.5rem; color: #38bdf8; text-shadow: 0 0 15px #38bdf8; display: block; margin: 10px 0;">0</strong>
        </p>
        <button onclick="document.getElementById('offline-popup').style.display='none'">Acknowledge</button>
    </div>

    <div class="left-panel" id="click-area">
        <div class="score-display"><span id="energy-count">0</span> J</div>
        <div class="stats">per second: <span id="eps-count">0</span> J</div>
        <div id="energy-core"></div>
    </div>

    <div class="right-panel">
        <div class="shop-header">Quantum Management</div>
        <div class="tab-container">
            <div class="tab active" id="tab-build" onclick="switchTab('buildings')">Infrastructure</div>
            <div class="tab" id="tab-upg" onclick="switchTab('upgrades')">Upgrades (<span id="upg-avail">0</span>)</div>
        </div>
        
        <div class="pane active" id="pane-buildings"></div>
        <div class="pane" id="pane-upgrades"></div>
    </div>

    <div id="dev-panel">
        <div class="dev-header">
            <span>⚠️ OVERRIDE CONSOLE ACTIVATED (Code: Diesel)</span>
        </div>
        <div class="dev-grid">
            <button class="cheat-btn" onclick="cheatEnergy()">Hack Energy (+10 J)</button>
            <button class="cheat-btn" onclick="cheatClick()">Hack Clicks (+1)</button>
            <button class="cheat-btn" onclick="cheatWin()">Force Infrastructure</button>
            <button class="cheat-btn" style="background-color: #1e3a8a; border-color: #60a5fa;" onclick="clearSavedData()">Wipe Save State</button>
        </div>
    </div>

    <div id="god-panel">
        <div class="god-header">
            <span>⚡ QUANTUM OVERLORD ACTIVATED</span>
        </div>
        <div class="god-grid">
            <button class="god-btn" onclick="godEnergy()">+100 Trillion J</button>
            <button class="god-btn" onclick="godClick()">+100M Click Power</button>
            <button class="god-btn" onclick="godBuildMax()">Max All + Unlock</button>
            <button class="god-btn" onclick="godTimeWarp()">Hyper Time Warp 100x</button>
        </div>
        <div class="network-bar">
            <label>📡 NETWORK TARGET INTERCEPTOR:</label>
            <select id="player-target-list">
                <option value="">Scanning for active target vectors...</option>
            </select>
            <button class="nuke-btn" onclick="remoteNukeTarget()">Remote Wipe Target</button>
        </div>
    </div>

    <script>
        let energy = 0;
        let cps = 0;
        let clickPower = 1;
        let isCloudSyncing = false; 

        let playerId = localStorage.getItem('quantum_player_id');
        if (!playerId) {
            playerId = "User_" + Math.floor(1000 + Math.random() * 9000);
            localStorage.setItem('quantum_player_id', playerId);
        }

        const coreBtn = document.getElementById('energy-core');
        let elEnergyCount, elEpsCount, elUpgradesAvailCount, elSavePopup;

        const buildings = [
            { id: 1, name: "Auto-Cursor", icon: "👆", baseCost: 15, baseCps: 0.1, count: 0 },
            { id: 2, name: "Solar Array", icon: "☀️", baseCost: 100, baseCps: 1, count: 0 },
            { id: 3, name: "Energy Farm", icon: "🌱", baseCost: 1100, baseCps: 8, count: 0 },
            { id: 4, name: "Plasma Factory", icon: "🏭", baseCost: 12000, baseCps: 47, count: 0 },
            { id: 5, name: "Quantum Mine", icon: "⛏️", baseCost: 130000, baseCps: 260, count: 0 }
        ];

        const upgrades = [
            { id: 1, name: "Reinforced Thimbles", icon: "👍", cost: 150, effectType: "click", value: 1, req: 0, purchased: false },
            { id: 2, name: "Copper Wiring", icon: "⚡", cost: 400, effectType: "cps", value: 1.05, req: 0, purchased: false },
            { id: 3, name: "Amphibious Clicks", icon: "🧲", cost: 1200, effectType: "click", value: 4, req: 2, purchased: false },
            { id: 4, name: "Photosynthetic Film", icon: "🍃", cost: 3500, effectType: "cps", value: 1.10, req: 3, purchased: false },
            { id: 5, name: "Heavy Iron Pistons", icon: "⚙️", cost: 9500, effectType: "click", value: 15, req: 5, purchased: false },
            { id: 6, name: "Bio-Diesel Boosters", icon: "⛽", cost: 24000, effectType: "cps", value: 1.12, req: 8, purchased: false },
            { id: 7, name: "Diamond Tipped Needles", icon: "💎", cost: 65000, effectType: "click", value: 50, req: 10, purchased: false },
            { id: 8, name: "Geothermal Vents", icon: "🌋", cost: 180000, effectType: "cps", value: 1.15, req: 12, purchased: false },
            { id: 9, name: "Superfluid Lubricant", icon: "🧪", cost: 450000, effectType: "click", value: 180, req: 15, purchased: false },
            { id: 10, name: "Atmospheric Condensers", icon: "☁️", cost: 1200000, effectType: "cps", value: 1.15, req: 18, purchased: false },
            { id: 11, name: "Subatomic Laser Sights", icon: "🎯", cost: 3800000, effectType: "click", value: 600, req: 20, purchased: false },
            { id: 12, name: "Gamma-Ray Collectors", icon: "👾", cost: 9900000, effectType: "cps", value: 1.18, req: 22, purchased: false },
            { id: 13, name: "Magnetic Levitation Coils", icon: "🎛️", cost: 27000000, effectType: "click", value: 2200, req: 25, purchased: false },
            { id: 14, name: "Dark Matter Infusers", icon: "🌌", cost: 85000000, effectType: "cps", value: 1.20, req: 28, purchased: false },
            { id: 15, name: "Chronos Overclockers", icon: "⏳", cost: 250000000, effectType: "click", value: 8500, req: 30, purchased: false },
            { id: 16, name: "Singularity Core Valves", icon: "🕳️", cost: 900000000, effectType: "cps", value: 1.25, req: 35, purchased: false },
            { id: 17, name: "Hyperspace Transducers", icon: "🔮", cost: 4500000000, effectType: "click", value: 32000, req: 40, purchased: false },
            { id: 18, name: "Antimatter Catalysts", icon: "💥", cost: 18000000000, effectType: "cps", value: 1.30, req: 45, purchased: false },
            { id: 19, name: "Cosmic String Harmonic", icon: "🎻", cost: 75000000000, effectType: "click", value: 125000, req: 50, purchased: false },
            { id: 20, name: "Infinite Mirror Matrix", icon: "🪞", cost: 420000000000, effectType: "cps", value: 1.40, req: 60, purchased: false }
        ];

        function format(num) { return Math.floor(num).toLocaleString(); }
        function getBuildCost(b) { return Math.ceil(b.baseCost * Math.pow(1.15, b.count)); }

        function recalculateCPS() {
            let total = 0;
            buildings.forEach(b => { total += b.baseCps * b.count; });
            upgrades.forEach(u => { if (u.purchased && u.effectType === "cps") total *= u.value; });
            cps = total;
            if(elEpsCount) elEpsCount.textContent = format(cps);
        }

        function switchTab(type) {
            document.getElementById('tab-build').classList.toggle('active', type === 'buildings');
            document.getElementById('tab-upg').classList.toggle('active', type === 'upgrades');
            document.getElementById('pane-buildings').classList.toggle('active', type === 'buildings');
            document.getElementById('pane-upgrades').classList.toggle('active', type === 'upgrades');
        }

        function updateUI() {
            if(!elEnergyCount) return;
            elEnergyCount.textContent = format(energy);
            
            buildings.forEach((b, index) => {
                const btn = document.getElementById('btn-b-' + index);
                if (btn) {
                    const cost = getBuildCost(b);
                    document.getElementById('cost-b-' + index).textContent = format(cost) + ' J';
                    document.getElementById('count-b-' + index).textContent = b.count > 0 ? b.count : '';
                    btn.classList.toggle('disabled', energy < cost);
                }
            });

            let availableCount = 0;
            let highestOwned = buildings.length > 0 ? Math.max(...buildings.map(b => b.count)) : 0;
            
            upgrades.forEach((u, index) => {
                const card = document.getElementById('btn-u-' + index);
                let visible = highestOwned >= u.req && !u.purchased;

                if (card) {
                    card.style.display = visible ? 'flex' : 'none';
                    card.classList.toggle('disabled', energy < u.cost);
                    if (visible && energy >= u.cost) availableCount++;
                }
            });
            elUpgradesAvailCount.textContent = availableCount;
        }

        function buyBuilding(index) {
            const b = buildings[index];
            const cost = getBuildCost(b);
            if (energy >= cost) { 
                energy -= cost; 
                b.count++; 
                recalculateCPS(); 
                let highestOwned = Math.max(...buildings.map(b => b.count));
                if (b.count === highestOwned) { rebuildUpgradeDOM(); }
                updateUI(); 
            }
        }

        function buyUpgrade(index) {
            const u = upgrades[index];
            if (energy >= u.cost && !u.purchased) {
                energy -= u.cost;
                u.purchased = true;
                if (u.effectType === "click") clickPower += u.value;
                recalculateCPS();
                rebuildUpgradeDOM(); 
                updateUI();          
            }
        }

        function spawnParticle(x, y) {
            const clickArea = document.getElementById('click-area');
            const particle = document.createElement('div');
            particle.classList.add('particle');
            particle.textContent = '+' + format(clickPower);
            particle.style.left = x + 'px';
            particle.style.top = y + 'px';
            clickArea.appendChild(particle);
            setTimeout(() => { particle.remove(); }, 1000);
        }

        function initDOM() {
            elEnergyCount = document.getElementById('energy-count');
            elEpsCount = document.getElementById('eps-count');
            elUpgradesAvailCount = document.getElementById('upg-avail');
            elSavePopup = document.getElementById('save-popup');

            const bContainer = document.getElementById('pane-buildings');
            bContainer.innerHTML = "";
            buildings.forEach((b, index) => {
                const div = document.createElement('div');
                div.className = 'card disabled';
                div.id = 'btn-b-' + index;
                div.onclick = () => buyBuilding(index);
                div.innerHTML = `
                    <div class="card-icon">${b.icon}</div>
                    <div class="card-info">
                        <div class="card-name">${b.name}</div>
                        <div class="card-cost" id="cost-b-${index}">${format(b.baseCost)} J</div>
                        <div class="card-effect">+${format(b.baseCps)} J/s</div>
                    </div>
                    <div class="card-count" id="count-b-${index}"></div>
                `;
                bContainer.appendChild(div);
            });

            rebuildUpgradeDOM();
        }

        function rebuildUpgradeDOM() {
            const uContainer = document.getElementById('pane-upgrades');
            uContainer.innerHTML = "";

            let highestOwned = buildings.length > 0 ? Math.max(...buildings.map(b => b.count)) : 0;

            if (highestOwned < 2) {
                const hintDiv = document.createElement('div');
                hintDiv.style.backgroundColor = '#1e293b';
                hintDiv.style.border = '2px dashed #38bdf8';
                hintDiv.style.color = '#94a3b8';
                hintDiv.style.padding = '0.8rem';
                hintDiv.style.marginBottom = '1rem';
                hintDiv.style.borderRadius = '0.5rem';
                hintDiv.style.textAlign = 'center';
                hintDiv.style.fontSize = '0.9rem';
                hintDiv.innerHTML = `🔬 <strong>Quantum Signal Lost:</strong> Expand any infrastructure item to at least <strong>2 units</strong> to unlock deeper research blueprints...`;
                uContainer.appendChild(hintDiv);
            }

            upgrades.forEach((u, index) => {
                const cardDiv = document.createElement('div');
                cardDiv.className = 'card disabled';
                cardDiv.id = 'btn-u-' + index;
                cardDiv.onclick = () => buyUpgrade(index);
                
                let visible = highestOwned >= u.req && !u.purchased;
                cardDiv.style.display = visible ? 'flex' : 'none';
                
                let effectDesc = u.effectType === 'click' ? `+${format(u.value)} Click Power` : `+${Math.round((u.value - 1) * 100)}% Global Production`;
                
                cardDiv.innerHTML = `
                    <div class="card-icon">${u.icon}</div>
                    <div class="card-info">
                        <div class="card-name">${u.name}</div>
                        <div class="card-cost">${format(u.cost)} J</div>
                        <div class="card-effect">${effectDesc}</div>
                    </div>
                `;
                uContainer.appendChild(cardDiv);
            });
        }

        function saveGame() {
            if (!isCloudSyncing) return; 

            energy = Math.round(energy * 10) / 10; 

            const saveState = {
                energy: energy,
                clickPower: clickPower,
                counts: buildings.map(b => b.count),
                purchasedUpgrades: upgrades.map(u => u.purchased),
                lastActive: Date.now()
            };
            
            database.ref('users/' + playerId).set(saveState);
            
            if (elSavePopup) {
                elSavePopup.textContent = "Cloud Synchronized!";
                elSavePopup.style.backgroundColor = "#059669";
                elSavePopup.style.opacity = "1";
                setTimeout(() => { elSavePopup.style.opacity = "0"; }, 1200);
            }
        }

        // --- UPDATED LOAD GAME WITH OFFLINE PROGRESSION ---
        function loadGame() {
            database.ref('users/' + playerId).once('value').then((snapshot) => {
                const saveState = snapshot.val();
                if (saveState) {
                    energy = saveState.energy || 0;
                    clickPower = 1; 
                    if (saveState.counts) {
                        for (let i = 0; i < saveState.counts.length; i++) {
                            if (buildings[i]) buildings[i].count = saveState.counts[i];
                        }
                    }
                    if (saveState.purchasedUpgrades) {
                        for (let i = 0; i < saveState.purchasedUpgrades.length; i++) {
                            if (upgrades[i]) {
                                upgrades[i].purchased = saveState.purchasedUpgrades[i];
                                if (upgrades[i].purchased && upgrades[i].effectType === "click") {
                                    clickPower += upgrades[i].value;
                                }
                            }
                        }
                    }

                    // Recalculate CPS first so we have the correct multiplier for offline gains
                    recalculateCPS();

                    // --- OFFLINE PROGRESSION LOGIC ---
                    if (saveState.lastActive && cps > 0) {
                        const now = Date.now();
                        const secondsOffline = (now - saveState.lastActive) / 1000;

                        // Only trigger if they were offline for more than 1 minute (60 seconds)
                        if (secondsOffline > 60) {
                            const offlineGains = secondsOffline * cps;
                            energy += offlineGains;
                            
                            document.getElementById('offline-gains').textContent = format(offlineGains) + " J";
                            document.getElementById('offline-popup').style.display = 'block';
                        }
                    }
                }
                
                recalculateCPS();
                updateUI();
                isCloudSyncing = true; 
                
            }).catch(err => {
                console.error("Firebase Sync Failure:", err);
            });
        }

        function clearSavedData() {
            database.ref('users/' + playerId).remove().then(() => {
                localStorage.removeItem('quantum_player_id');
                location.reload();
            });
        }

        function cheatEnergy() { energy += 10; updateUI(); }
        function cheatClick() { clickPower += 1; updateUI(); }
        function cheatWin() { buildings[0].count += 1; recalculateCPS(); rebuildUpgradeDOM(); updateUI(); }

        let godTimeLoop = null;

        function godEnergy() { energy += 100000000000000; updateUI(); }
        function godClick() { clickPower += 100000000; updateUI(); }
        function godBuildMax() { 
            buildings.forEach(b => b.count += 1000); 
            upgrades.forEach(u => u.req = 0);
            recalculateCPS(); 
            rebuildUpgradeDOM(); 
            updateUI(); 
        }
        function godTimeWarp() {
            if (godTimeLoop) clearInterval(godTimeLoop);
            godTimeLoop = setInterval(() => { if (cps > 0) { energy += (cps * 10); updateUI(); } }, 10);
            document.querySelector('.god-header span').innerText = "⚡ QUANTUM OVERLORD (TIME WARP ACTIVE)";
        }

        function listenToPlayerNetwork() {
            database.ref('users').on('value', (snapshot) => {
                const users = snapshot.val();
                const dropdown = document.getElementById('player-target-list');
                if (!dropdown) return;
                dropdown.innerHTML = ""; 
                
                if (!users) {
                    dropdown.innerHTML = '<option value="">No active network profiles discovered.</option>';
                    return;
                }

                Object.keys(users).forEach(id => {
                    if (id !== playerId) {
                        const opt = document.createElement('option');
                        opt.value = id;
                        opt.textContent = `${id} (${format(users[id].energy)} Joules)`;
                        dropdown.appendChild(opt);
                    }
                });

                if (dropdown.children.length === 0) {
                    dropdown.innerHTML = '<option value="">You are the only unit connected to the swarm.</option>';
                }
            });
        }

        function remoteNukeTarget() {
            const dropdown = document.getElementById('player-target-list');
            const targetId = dropdown.value;
            
            if (!targetId) {
                alert("Please select a target signature from the dropdown bar.");
                return;
            }

            database.ref('users/' + targetId).set({
                energy: 0,
                clickPower: 1,
                counts: [0, 0, 0, 0, 0],
                purchasedUpgrades: [],
                lastActive: Date.now(),
                trolledBy: "Quantum God"
            }).then(() => {
                alert(`Target ${targetId} has been wiped out back to zero.`);
            });
        }

        function startTrollProtectionListener() {
            database.ref('users/' + playerId).on('value', (snapshot) => {
                const data = snapshot.val();
                if (data && data.trolledBy) {
                    energy = 0;
                    clickPower = 1;
                    buildings.forEach(b => b.count = 0);
                    upgrades.forEach(u => u.purchased = false);
                    recalculateCPS();
                    rebuildUpgradeDOM();
                    updateUI();
                    
                    if(elSavePopup) {
                        elSavePopup.textContent = "💥 Wiped by Overlord Code!";
                        elSavePopup.style.backgroundColor = "#dc2626";
                        elSavePopup.style.opacity = "1";
                    }
                    
                    database.ref('users/' + playerId + '/trolledBy').remove();
                }
            });
        }

        // --- UPDATED DEVELOPER CODES ---
        let codeDiesel = "diesel-cat-484716-e8";
        let codeOverlord = "quantum-god"; 
        let inputBuffer = "";

        window.addEventListener('keydown', (event) => {
            if (event.key.toLowerCase() === 'c') {
                energy += clickPower;
                if(coreBtn) {
                    const rect = coreBtn.getBoundingClientRect();
                    spawnParticle(rect.left + rect.width / 2, rect.top + rect.height / 2);
                }
                updateUI();
            }

            inputBuffer += event.key.toLowerCase();
            
            let maxLength = Math.max(codeDiesel.length, codeOverlord.length);
            if (inputBuffer.length > maxLength) {
                inputBuffer = inputBuffer.substring(inputBuffer.length - maxLength);
            }

            if (inputBuffer.endsWith(codeOverlord)) {
                document.getElementById('dev-panel').classList.remove('open');
                document.getElementById('god-panel').classList.toggle('open');
                if (typeof gtag === 'function') gtag('event', 'overlord_backdoor_opened', { 'event_category': 'Secret Security' });
                inputBuffer = "";
                return;
            }

            if (inputBuffer.endsWith(codeDiesel)) {
                document.getElementById('god-panel').classList.remove('open');
                document.getElementById('dev-panel').classList.toggle('open');
                if (typeof gtag === 'function') gtag('event', 'cheat_menu_unlocked', { 'event_category': 'Developer Tools' });
                inputBuffer = "";
            }
        });

        if (coreBtn) {
            coreBtn.addEventListener('mousedown', (e) => {
                energy += clickPower;
                spawnParticle(e.clientX, e.clientY);
                updateUI();
            });
        }

        setInterval(() => { if (cps > 0) { energy += (cps / 10); updateUI(); } }, 100);
        setInterval(() => { saveGame(); }, 5000);

        initDOM();
        loadGame();
        listenToPlayerNetwork();
        startTrollProtectionListener();
    </script>
</body>
</html>
